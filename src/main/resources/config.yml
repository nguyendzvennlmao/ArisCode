Settings:
  # Kiem tra IP khi nhap code
  IP-Check: true
  
  # Dinh dang code random (X = ky tu random)
  GiftcodeFormat: "XXXX-XXXX-XXXX"
  
  # So luong code random tao ra
  CodeRandom: 10
  
  # So lan toi da nhap code random cho 1 player
  RandomMaxUse: 1
  
  # Cai dat hien thi tin nhan
  Message:
    # Hien thi tin nhan trong chat
    chat: true
    # Hien thi tin nhan tren actionbar
    actionbar: false

# Tat ca tin nhan hien thi cua plugin
