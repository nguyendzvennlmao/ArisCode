name: Build ArisCode Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ Repo (v4)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java (v4)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Bước 3: Build plugin bằng Maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml

      # Bước 4: Lưu file .jar đã build thành Artifact (v4)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArisCode-Folia
          path: target/*.jar
          if-no-files-found: error
